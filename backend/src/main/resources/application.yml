server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/agent.db
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.agent.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  config: classpath:logback-spring.xml

jwt:
  secret: YourSecretKeyForJWTTokenGenerationMustBe256BitsOrLonger123456789
  expiration: 86400000

# 加密配置
encryption:
  aes-key: ThisIsASecretKey1234567890123456